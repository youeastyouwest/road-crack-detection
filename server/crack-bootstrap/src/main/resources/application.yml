server:
  port: 8080

spring:
  application:
    name: road-crack-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  sql:
    init:
      mode: never
  mail:
    # ===== QQ邮箱 SMTP 配置 =====
    # 1. 登录QQ邮箱 → 设置 → 账户 → POP3/SMTP服务 → 开启
    # 2. 获取授权码（不是QQ密码）
    # 3. 将下方 username 和 password 替换为你的邮箱和授权码
    host: smtp.qq.com
    port: 587
    username: 2937055400@qq.com
    password: pqzwufisoczydfcj
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

crack:
  persistence:
    mode: memory
  algorithm:
    mock-enabled: false
    base-url: http://localhost:8000
    video-path: /detect/video
    video-read-timeout-millis: 300000
  agent:
    siliconflow:
      api-key:
      base-url: https://api.siliconflow.cn/v1
      model: Qwen/Qwen2.5-7B-Instruct
  upload:
    dir: ./uploads
  websocket:
    endpoint: /ws/crack

jwt:
  secret: r0ad-crack-d3tecti0n-jwt-s3cret-k3y-2025-please-change
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.roadcrack: INFO

---
spring:
  config:
    activate:
      on-profile: db
  datasource:
    url: jdbc:mysql://localhost:3308/road_crack?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/mysql/step0_auth_schema.sql,classpath:db/mysql/step1_detection_schema.sql,classpath:db/mysql/step2_work_order_schema.sql,classpath:db/mysql/step3_maintenance_report_schema.sql,classpath:db/mysql/step4_alert_schema.sql,classpath:db/mysql/step5_road_schema.sql,classpath:db/mysql/step6_health_archive_schema.sql,classpath:db/mysql/step7_crowd_report_schema.sql,classpath:db/mysql/step8_operation_log_schema.sql
      data-locations: classpath:db/mysql/seed.sql

crack:
  persistence:
    mode: db

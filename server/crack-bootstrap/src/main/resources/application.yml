server:
  port: 8080

spring:
  application:
    name: road-crack-backend
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  sql:
    init:
      mode: 

crack:
  persistence:
    mode: 
  algorithm:
    mock-enabled: false
    base-url: http://localhost:8000
  agent:
    siliconflow:
      api-key: 
      base-url: https://api.siliconflow.cn/v1
      model: Qwen/Qwen2.5-7B-Instruct
  upload:
    dir: ./uploads
  websocket:
    endpoint: /ws/crack

logging:
  level:
    com.roadcrack: INFO